<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>متجر فجر</title>

<style>

body{
font-family:Arial;
background:#0b1a2a;
color:white;
text-align:center;
margin:0;
padding:0;
}

header{
padding:20px;
font-size:40px;
color:#ffb347;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:30px;
padding:20px;
}

.card{
background:#142a44;
padding:15px;
border-radius:15px;
width:230px;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.card img{
width:100%;
border-radius:10px;
}

.price{
color:#ffd700;
font-size:20px;
margin:10px 0;
}

button{
background:#ff8a00;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
color:white;
font-size:14px;
}

button:hover{
background:#ff6a00;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 20px;
background:#081321;
}

.cart{
cursor:pointer;
font-size:18px;
}

.cart-box{
position:fixed;
top:0;
left:0;
width:300px;
height:100%;
background:#081321;
padding:20px;
transform:translateX(-100%);
transition:0.3s;
}

.cart-box.active{
transform:translateX(0);
}

.cart-item{
margin:10px 0;
}

.whatsapp{
margin-top:20px;
background:#25D366;
}

</style>
</head>

<body>

<div class="topbar">
<div>🌅 متجر فجر</div>
<div class="cart" onclick="toggleCart()">🛒 السلة (<span id="count">0</span>)</div>
</div>

<div class="cart-box" id="cartBox">
<h2>السلة</h2>
<div id="cartItems"></div>
<p>الإجمالي: <span id="total">0</span> ريال</p>

<button class="whatsapp" onclick="sendOrder()">إرسال الطلب واتساب</button>
</div>

<header>المنتجات</header>

<div class="products">

<div class="card">
<img src="fajr-al-bidaya.jpeg">
<h3>البداية</h3>
<p class="price">39 ريال</p>
<button onclick="addCart('البداية',39)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-arabian-dawn.jpeg">
<h3>الفجر العربي</h3>
<p class="price">49 ريال</p>
<button onclick="addCart('الفجر العربي',49)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-icy-fresh.jpeg">
<h3>آيسي فريش</h3>
<p class="price">59 ريال</p>
<button onclick="addCart('آيسي فريش',59)">إضافة للسلة</button>
</div>

<div class="card">
<img src="fajr-dawn-rise.jpeg">
<h3>الفجر المشتعل</h3>
<p class="price">99 ريال</p>
<button onclick="addCart('الفجر المشتعل',99)">إضافة للسلة</button>
</div>

</div>

<script>

let cart=[]

function addCart(name,price){

cart.push({name,price})

updateCart()

}

function updateCart(){

let items=document.getElementById("cartItems")
let total=0

items.innerHTML=""

cart.forEach(p=>{

total+=p.price

items.innerHTML+=`<div class="cart-item">${p.name} - ${p.price} ريال</div>`

})

document.getElementById("total").innerText=total
document.getElementById("count").innerText=cart.length

}

function toggleCart(){

document.getElementById("cartBox").classList.toggle("active")

}

function sendOrder(){

if(cart.length==0){
alert("السلة فارغة")
return
}

let message="طلب جديد من متجر فجر:%0A"

cart.forEach(p=>{
message+=`${p.name} - ${p.price} ريال%0A`
})

let total=cart.reduce((a,b)=>a+b.price,0)

message+=`%0Aالإجمالي: ${total} ريال`
message+=`%0Aالدفع تحويل بنكي`
message+=`%0Aالآيبان: SA6430100991104941618846`

window.open(`https://wa.me/966548659564?text=${message}`)

}

</script>

</body>
</html>
