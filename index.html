<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>متجر فجر</title>
  <style>
    *{
      box-sizing:border-box;
      margin:0;
      padding:0;
    }

    :root{
      --bg:#081321;
      --bg2:#0d1b2f;
      --card:#10233d;
      --card2:#163154;
      --text:#ffffff;
      --muted:#c8d2e0;
      --orange:#ff8a00;
      --orange2:#ff5e00;
      --gold:#ffd54a;
      --danger:#ff4d6d;
      --line:rgba(255,255,255,.12);
      --shadow:0 10px 30px rgba(0,0,0,.35);
    }

    body{
      font-family: Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(circle at top center, rgba(255,120,0,.35), transparent 24%),
        radial-gradient(circle at 20% 15%, rgba(255,170,80,.10), transparent 18%),
        radial-gradient(circle at 80% 20%, rgba(255,90,0,.09), transparent 14%),
        linear-gradient(180deg, #122a52 0%, #0b1a2a 38%, #0a1220 100%);
      overflow-x:hidden;
      position:relative;
    }

    /* نجوم */
    body::before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background-image:
        radial-gradient(2px 2px at 8% 14%, rgba(255,255,255,.95), transparent 55%),
        radial-gradient(1.5px 1.5px at 22% 8%, rgba(255,255,255,.8), transparent 55%),
        radial-gradient(2px 2px at 34% 18%, rgba(255,255,255,.9), transparent 55%),
        radial-gradient(1.5px 1.5px at 47% 10%, rgba(255,255,255,.7), transparent 55%),
        radial-gradient(2px 2px at 58% 15%, rgba(255,255,255,.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 72% 9%, rgba(255,255,255,.9), transparent 55%),
        radial-gradient(2px 2px at 85% 16%, rgba(255,255,255,.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 91% 7%, rgba(255,255,255,.7), transparent 55%),
        radial-gradient(2px 2px at 13% 32%, rgba(255,255,255,.8), transparent 55%),
        radial-gradient(1.5px 1.5px at 29% 27%, rgba(255,255,255,.85), transparent 55%),
        radial-gradient(2px 2px at 63% 30%, rgba(255,255,255,.75), transparent 55%),
        radial-gradient(1.5px 1.5px at 79% 25%, rgba(255,255,255,.85), transparent 55%);
      opacity:.9;
      z-index:0;
    }

    /* جذور / توهج زخرفي */
    body::after{
      content:"";
      position:fixed;
      inset:auto 0 0 0;
      height:220px;
      pointer-events:none;
      background:
        radial-gradient(circle at 15% 100%, rgba(255,110,0,.35), transparent 32%),
        radial-gradient(circle at 50% 100%, rgba(255,145,0,.25), transparent 28%),
        radial-gradient(circle at 85% 100%, rgba(255,90,0,.30), transparent 30%);
      filter:blur(10px);
      z-index:0;
    }

    .topbar{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter: blur(12px);
      background:rgba(5,10,18,.7);
      border-bottom:1px solid var(--line);
    }

    .topbar-inner{
      max-width:1400px;
      margin:auto;
      padding:14px 18px;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
    }

    .brand{
      display:flex;
      align-items:center;
      gap:10px;
      font-size:30px;
      font-weight:700;
      color:#ffb14a;
      text-shadow:0 0 10px rgba(255,140,0,.25);
    }

    .brand-badge{
      width:48px;
      height:48px;
      border-radius:50%;
      display:flex;
      align-items:center;
      justify-content:center;
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      box-shadow:0 0 22px rgba(255,120,0,.35);
      font-size:24px;
    }

    .actions{
      display:flex;
      align-items:center;
      gap:10px;
      flex-wrap:wrap;
    }

    .action-btn{
      border:none;
      cursor:pointer;
      border-radius:14px;
      padding:12px 14px;
      background:rgba(255,255,255,.08);
      color:#fff;
      box-shadow:var(--shadow);
      transition:.2s ease;
      font-size:15px;
    }

    .action-btn:hover{
      transform:translateY(-2px);
      background:rgba(255,255,255,.14);
    }

    .cart-btn{
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      color:#fff;
      font-weight:700;
      position:relative;
    }

    .badge{
      position:absolute;
      top:-8px;
      left:-8px;
      min-width:24px;
      height:24px;
      padding:0 6px;
      border-radius:999px;
      background:#ff315a;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:12px;
      font-weight:700;
      border:2px solid #081321;
    }

    .hero{
      position:relative;
      z-index:1;
      max-width:1200px;
      margin:32px auto 8px;
      padding:0 18px;
      text-align:center;
    }

    .hero h1{
      font-size:52px;
      margin-bottom:10px;
      color:#fff;
      text-shadow:0 0 20px rgba(255,145,0,.18);
    }

    .hero p{
      color:var(--muted);
      font-size:18px;
      line-height:1.8;
      max-width:900px;
      margin:0 auto 20px;
    }

    .info-strip{
      display:flex;
      justify-content:center;
      gap:12px;
      flex-wrap:wrap;
      margin-top:14px;
    }

    .pill{
      background:rgba(255,255,255,.08);
      border:1px solid var(--line);
      color:#fff;
      padding:10px 14px;
      border-radius:999px;
      font-size:14px;
    }

    .products-section{
      position:relative;
      z-index:1;
      max-width:1400px;
      margin:20px auto 60px;
      padding:0 18px;
    }

    .section-title{
      font-size:32px;
      margin-bottom:20px;
      text-align:center;
      color:#fff;
    }

    .products{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
      gap:22px;
    }

    .card{
      background:linear-gradient(180deg, rgba(20,42,68,.96), rgba(16,35,61,.96));
      border:1px solid var(--line);
      border-radius:22px;
      padding:16px;
      box-shadow:var(--shadow);
      transition:.25s ease;
      position:relative;
      overflow:hidden;
    }

    .card:hover{
      transform:translateY(-4px);
      box-shadow:0 14px 30px rgba(0,0,0,.42);
    }

    .fav-btn{
      position:absolute;
      top:14px;
      left:14px;
      width:42px;
      height:42px;
      border:none;
      border-radius:50%;
      cursor:pointer;
      background:rgba(0,0,0,.38);
      color:#fff;
      font-size:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:1px solid rgba(255,255,255,.18);
      transition:.2s ease;
      z-index:2;
    }

    .fav-btn.active{
      background:rgba(255,77,109,.2);
      color:#ff7b97;
      border-color:rgba(255,77,109,.45);
    }

    .img-wrap{
      width:100%;
      aspect-ratio:4/5;
      border-radius:18px;
      overflow:hidden;
      background:#0b1a2a;
      margin-bottom:14px;
    }

    .img-wrap img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .card h3{
      font-size:24px;
      margin-bottom:10px;
    }

    .card p.desc{
      color:var(--muted);
      font-size:14px;
      line-height:1.7;
      min-height:52px;
      margin-bottom:12px;
    }

    .price{
      color:var(--gold);
      font-size:28px;
      font-weight:700;
      margin-bottom:14px;
    }

    .card-actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    .btn{
      flex:1;
      min-width:110px;
      border:none;
      cursor:pointer;
      padding:12px 14px;
      border-radius:12px;
      font-size:15px;
      font-weight:700;
      transition:.2s ease;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--orange),var(--orange2));
      color:#fff;
    }

    .btn-primary:hover{
      transform:translateY(-2px);
    }

    .btn-secondary{
      background:rgba(255,255,255,.08);
      color:#fff;
      border:1px solid var(--line);
    }

    .btn-secondary:hover{
      background:rgba(255,255,255,.13);
    }

    /* Drawer */
    .drawer-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.65);
      display:none;
      z-index:100;
    }

    .drawer-overlay.show{
      display:block;
    }

    .drawer{
      position:fixed;
      top:0;
      left:0;
      width:min(420px, 100%);
      height:100%;
      background:#0d1b2f;
      border-right:1px solid var(--line);
      box-shadow:var(--shadow);
      transform:translateX(-100%);
      transition:.25s ease;
      z-index:101;
      display:flex;
      flex-direction:column;
    }

    .drawer.show{
      transform:translateX(0);
    }

    .drawer-header{
      padding:18px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:10px;
    }

    .drawer-title{
      font-size:24px;
      font-weight:700;
    }

    .close-btn{
      border:none;
      cursor:pointer;
      width:42px;
      height:42px;
      border-radius:50%;
      background:rgba(255,255,255,.08);
      color:#fff;
      font-size:20px;
    }

    .drawer-body{
      flex:1;
      overflow:auto;
      padding:18px;
    }

    .cart-empty{
      text-align:center;
      color:var(--muted);
      margin-top:50px;
      line-height:2;
    }

    .cart-item{
      display:flex;
      gap:12px;
      align-items:center;
      background:rgba(255,255,255,.05);
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px;
      margin-bottom:12px;
    }

    .cart-item img{
      width:72px;
      height:72px;
      object-fit:cover;
      border-radius:12px;
      flex-shrink:0;
    }

    .cart-item-info{
      flex:1;
    }

    .cart-item-info h4{
      font-size:17px;
      margin-bottom:6px;
    }

    .cart-item-info p{
      color:var(--gold);
      font-weight:700;
    }

    .qty-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-top:8px;
      flex-wrap:wrap;
    }

    .qty-btn{
      width:32px;
      height:32px;
      border:none;
      border-radius:10px;
      cursor:pointer;
      background:rgba(255,255,255,.09);
      color:#fff;
      font-size:18px;
    }

    .remove-btn{
      border:none;
      cursor:pointer;
      background:rgba(255,77,109,.15);
      color:#ff8aa0;
      padding:8px 10px;
      border-radius:10px;
    }

    .drawer-footer{
      border-top:1px solid var(--line);
      padding:18px;
      background:#0c1728;
    }

    .summary-row{
      display:flex;
      justify-content:space-between;
      margin-bottom:10px;
      color:var(--muted);
      font-size:15px;
    }

    .summary-total{
      display:flex;
      justify-content:space-between;
      font-size:22px;
      color:var(--gold);
      font-weight:700;
      margin:12px 0 14px;
    }

    /* Modal */
    .modal-overlay{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      z-index:120;
      padding:18px;
      overflow:auto;
    }

    .modal-overlay.show{
      display:block;
    }

    .modal{
      max-width:680px;
      margin:30px auto;
      background:linear-gradient(180deg,#132746,#0f1f38);
      border:1px solid var(--line);
      border-radius:24px;
      box-shadow:var(--shadow);
      overflow:hidden;
    }

    .modal-header{
      padding:18px 20px;
      border-bottom:1px solid var(--line);
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:
